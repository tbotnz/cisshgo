version: 2
project_name: cisshgo

builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # UPX compression disabled - not recommended for modern Go (2026):
    # - Triggers antivirus false positives
    # - Go 1.26+ has better built-in binary optimization
    # - ldflags "-s -w" already strips debug info for size reduction
    # hooks:
    #   post: upx "{{ .Path }}"

dockers_v2:
  - ids:
      - cisshgo
    images:
      - "ghcr.io/tbotnz/cisshgo"
    tags:
      - "latest"
      - "{{ .Tag }}"
      - "{{ .Version }}"
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - transcripts
    platforms:
      - linux/amd64
      - linux/arm64

sboms:
  - artifacts: archive

archives:
  - formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - transcripts/**/*
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

nfpms:
  - id: cisshgo
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: cisshgo
    homepage: https://github.com/tbotnz/cisshgo
    maintainer: tbotnz
    description: Simple, small, fast, concurrent SSH server to emulate network equipment (i.e. Cisco IOS) for testing purposes.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
