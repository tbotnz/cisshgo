[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

This project adheres to [Keep a Changelog](https://keepachangelog.com/en/1.0.0/)
and [Semantic Versioning](https://semver.org/).

**Stability commitment (v1.0.0+):** No breaking changes in minor or patch releases.
Deprecated features will be supported for at least one major version.
Migration guides will be provided for all major version upgrades.

Changes are generated from [Conventional Commits](https://www.conventionalcommits.org/).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}

{% else %}\
## [Unreleased]

{% endif %}\
{% set breaking_commits = commits | filter(attribute="breaking", value=true) %}\
{% if breaking_commits %}\
### ⚠️ Breaking Changes

{% for commit in breaking_commits %}\
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/tbotnz/cisshgo/commit/{{ commit.id }}))
{% if commit.body %}
  {{ commit.body | trim | replace(from="\n", to="\n  ") }}

{% endif %}\
{% endfor %}\
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
{% set non_breaking = commits | filter(attribute="breaking", value=false) %}\
{% if non_breaking %}\
### {{ group | upper_first }}

{% for commit in non_breaking %}\
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/tbotnz/cisshgo/commit/{{ commit.id }}))
{% if commit.body and (group == "🚀 Features") %}
  {{ commit.body | trim | replace(from="\n", to="\n  ") }}

{% endif %}\
{% endfor %}
{% endif %}\
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^refactor", group = "🔧 Refactoring" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^docs", group = "📚 Documentation" },
  { message = "^ci", group = "👷 CI/CD" },
  { message = "^chore", group = "🧹 Chores" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^style", group = "🎨 Style" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
